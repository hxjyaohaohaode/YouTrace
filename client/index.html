<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#e8941e" />
  <meta name="description" content="You live. I track. 你来生活我来记" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="有迹" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-TileColor" content="#e8941e" />
  <meta name="msapplication-tap-highlight" content="no" />
  <link rel="icon" type="image/svg+xml" href="/pwa-512x512.svg" />
  <link rel="apple-touch-icon" href="/pwa-512x512.svg" />
  <link rel="mask-icon" href="/pwa-512x512.svg" color="#e8941e" />
  <title>有迹</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fffcf7;
    }

    #splash svg {
      width: 80px;
      height: 80px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="splash-g" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#e8941e" />
          <stop offset="100%" stop-color="#c9553e" />
        </linearGradient>
      </defs>
      <circle cx="512" cy="512" r="56" fill="url(#splash-g)" />
      <circle cx="512" cy="512" r="140" fill="none" stroke="url(#splash-g)" stroke-width="14" opacity="0.55" />
      <circle cx="512" cy="512" r="236" fill="none" stroke="url(#splash-g)" stroke-width="11" opacity="0.3" />
      <circle cx="512" cy="512" r="344" fill="none" stroke="url(#splash-g)" stroke-width="8" opacity="0.14" />
    </svg>
  </div>
  <div id="root"></div>
  <script>
    window.addEventListener('load', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.transition = 'opacity 0.3s ease';
        setTimeout(function () { splash.remove(); }, 300);
      }
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
