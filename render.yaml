services:
  - type: web
    name: youji-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci && cd server && npx prisma generate && npx tsc -p tsconfig.build.json && cd ../client && npm run build && cp -r dist ../server/public
    startCommand: cd server && chmod +x start.sh && ./start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: youji-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://youtrace.onrender.com
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: MIMO_API_KEY
        sync: false
      - key: MIMO_BASE_URL
        value: https://token-plan-cn.xiaomimimo.com/v1
      - key: AMAP_KEY
        sync: false
      - key: QWEATHER_API_KEY
        sync: false
      - key: QWEATHER_API_HOST
        sync: false
      - key: ALIYUN_SMS_ACCESS_KEY_ID
        sync: false
      - key: ALIYUN_SMS_ACCESS_KEY_SECRET
        sync: false
      - key: ALIYUN_SMS_ENDPOINT
        value: dypnsapi.aliyuncs.com
      - key: ALIYUN_SMS_SIGN_NAME
        sync: false
      - key: ALIYUN_SMS_TEMPLATE_CODE
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:youji@app.com
      - key: LOG_LEVEL
        value: info

databases:
  - name: youji-db
    plan: free
    region: singapore
    databaseName: youji
    user: youji_user
